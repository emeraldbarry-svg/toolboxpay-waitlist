<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxPay — Early Access Waitlist</title>
  <link rel="icon" href="https://fav.farm/🟠" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #ff6600;
      --bg: #111111;
      --card: #181818;
      --steel: #333333;
      --white: #ffffff;
      --muted: #999999;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--white) !important; /* Force all text to white */
      line-height: 1.65;
    }
    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    
    .topbar { padding: 24px 0; border-bottom: 1px solid var(--steel); margin-bottom: 40px; }
    .logo { font-size: 1.45rem; font-weight: 800; text-decoration: none; }
    .logo .white { color: var(--white); }
    .logo .orange { color: var(--orange); }
    
    .hero { padding: 40px 0; text-align: center; }
    .hero h1 { font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 32px; color: var(--white); text-transform: uppercase; }
    .hero h1 .accent { color: var(--orange); }

    .countdown-container { margin: 0 auto 60px; display: flex; justify-content: center; gap: 15px; }
    .time-block { background: rgba(255,255,255,0.03); border: 1px solid var(--steel); padding: 20px; border-radius: 12px; min-width: 90px; text-align: center; }
    .time-num { display: block; font-size: 2rem; font-weight: 800; color: var(--orange); }
    .time-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 4px; }

    .form-card { 
      background: var(--card); 
      border: 1px solid var(--steel); 
      border-radius: 16px; 
      padding: 5px; 
      max-width: 700px; 
      margin: 0 auto 80px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    /* This forces the text inside the form area to be white if the embed allows it */
    iframe { color-scheme: dark; }

    .preview-section { padding: 80px 0; border-top: 1px solid var(--steel); background: #0c0c0c; }
    .preview-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .preview-text h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; }
    .preview-text p { color: var(--muted); font-size: 1.15rem; }
    .preview-image-wrap { border: 1px solid var(--steel); border-radius: 12px; overflow: hidden; }
    .preview-image-wrap img { width: 100%; display: block; }

    footer { padding: 40px 0; text-align: center; color: #444; font-size: 0.9rem; }

    @media (max-width: 860px) { .preview-inner { grid-template-columns: 1fr; text-align: center; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container"><a href="#" class="logo"><span class="white">toolbox</span><span class="orange">PAY</span></a></div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Spend Less Time On Admin.<br /><span class="accent">More Time On The Job.</span></h1>
      <div class="countdown-container" id="timer">
        <div class="time-block"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
        <div class="time-block"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
        <div class="time-block"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
        <div class="time-block"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
      </div>
    </div>
  </section>

  <div class="container">
    <div class="form-card">
      <iframe data-tally-src="https://tally.so/embed/ZjJooo?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="500" frameborder="0" title="Join ToolboxPay"></iframe>
    </div>
  </div>

  <section class="preview-section">
    <div class="container">
      <div class="preview-inner">
        <div class="preview-text">
          <h2>Built For Trades</h2>
          <p>Track your profit and manage your labour costs from the palm of your hand. No more paperwork on the weekends.</p>
        </div>
        <div class="preview-image-wrap">
          <img src="Profit%20analysis.png" alt="ToolboxPay Dashboard">
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 ToolboxPay. <a href="privacy.html" style="color: #444;">Privacy</a> | <a href="terms.html" style="color: #444;">Terms</a></p>
  </footer>

  <script src="https://tally.so/Widgets/Embed/v1.js"></script>
  <script>
    const launchDate = new Date("April 1, 2026 00:00:00").getTime();
    setInterval(function() {
      const now = new Date().getTime();
      const distance = launchDate - now;
      document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
      document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      document.getElementById("mins").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      document.getElementById("secs").innerHTML = Math.floor((distance % (1000 * 60)) / 1000);
    }, 1000);
  </script>
</body>
</html>

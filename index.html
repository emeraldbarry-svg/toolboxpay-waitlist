<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxPay — Early Access Waitlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Variables ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:        #ff6600;
      --orange-hover:  #e55a00;
      --bg:            #111111;
      --bg-alt:        #0d0d0d;
      --card:          #181818;
      --steel:         #333333;
      --white:         #ffffff;
      --muted:         #999999;
      --muted-light:   #cccccc;
      --radius:        24px;
      --transition:    0.22s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--white);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ─── Topbar ───────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--steel);
      padding: 18px 0;
    }

    .logo { font-size: 1.45rem; font-weight: 800; text-decoration: none; line-height: 1; }
    .logo .white { color: var(--white); }
    .logo .orange { color: var(--orange); }

    /* ─── Hero ─────────────────────────────────────────────────── */
    .hero { padding: 80px 0; text-align: center; }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900; line-height: 1.1;
      letter-spacing: -1.5px; margin-bottom: 24px;
    }

    .hero h1 .accent { color: var(--orange); }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem); color: var(--muted-light);
      max-width: 580px; margin: 0 auto 40px;
    }

    /* ─── Tally Form Card ──────────────────────────────────────── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--steel);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 620px;
      margin: 0 auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container">
      <a href="#" class="logo"><span class="white">toolbox</span><span class="orange">PAY</span></a>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Spend Less Time On Admin.<br /><span class="accent">More Time On The Job.</span></h1>
      <p class="hero-sub">The all-in-one payment tool built specifically for the trades.</p>
      
      <div class="form-card">
        <iframe 
          data-tally-src="https://tally.so/embed/ZjJooo?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
          loading="lazy" width="100%" height="500" frameborder="0" marginheight="0" marginwidth="0" title="Join ToolboxPay Early Access List">
        </iframe>
        <script>
          var d=document,w="https://tally.so/Widgets/Embed/v1.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s)}
        </script>
        </div>
    </div>
  </section>

</body>
</html>

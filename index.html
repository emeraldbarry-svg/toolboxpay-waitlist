<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxPay — Early Access Waitlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Variables ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff6600;
      --orange-hover: #e55a00;
      --bg: #0a0a0a;
      --card: #181818;
      --steel: #333333;
      --white: #ffffff;
      --muted: #999999;
      --green: #4caf50; /* YOUR BRAND GREEN */
      --radius: 14px;
    }

    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--white); line-height: 1.6; text-align: center; }
    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ─── The Green Trade Box Styling ─────────────────────────── */
    .form-group select {
      width: 100%;
      background-color: var(--green) !important; /* Forces the box to be green */
      color: #000000 !important; /* Black text for readability on green */
      border: 1px solid var(--green);
      border-radius: 10px;
      padding: 14px;
      font-weight: 600;
      appearance: none;
      cursor: pointer;
    }

    /* ─── Remaining Layout Styles ─────────────────────────────── */
    .hero { padding: 80px 0; }
    .hero h1 { font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900; margin-bottom: 24px; }
    .hero h1 .accent { color: var(--orange); }
    .hero-sub { color: var(--muted); margin-bottom: 40px; }
    
    .btn-primary { 
      background: var(--orange); 
      color: white; 
      padding: 18px 36px; 
      border-radius: 999px; 
      text-decoration: none; 
      font-weight: 700; 
      display: inline-block;
    }

    .form-card { background: var(--card); border: 1px solid var(--steel); border-radius: var(--radius); padding: 40px; max-width: 600px; margin: 40px auto; }
  </style>
</head>
<body>

  <header style="padding: 20px 0; border-bottom: 1px solid var(--steel);">
    <div class="container">
      <h2 style="font-weight:800;">toolbox<span style="color:var(--orange)">PAY</span></h2>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Spend Less Time On Admin.<br /><span class="accent">More Time On The Job.</span></h1>
      <p class="hero-sub">ToolboxPay helps trades businesses create quotes and invoices from their phone.</p>
      
      <div class="form-card" id="waitlist">
        <h2 style="margin-bottom: 20px;">Join Early Access</h2>
        <form>
          <div style="margin-bottom: 15px; text-align: left;">
            <label style="display:block; margin-bottom: 5px; font-size: 0.8rem;">Your Trade</label>
            <select required>
              <option value="" disabled selected>Select your trade...</option>
              <option>Builder</option>
              <option>Electrician</option>
              <option>Plumber</option>
              <option>Landscaper</option>
            </select>
          </div>
          <button type="submit" class="btn-primary" style="width: 100%; border:none;">Get Early Access</button>
        </form>
      </div>
    </div>
  </section>

</body>
</html>

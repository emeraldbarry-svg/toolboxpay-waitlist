<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxPay — Early Access Waitlist</title>
  
  <link rel="icon" href="https://fav.farm/🟠" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { 
      --orange: #ff6600; 
      --bg: #0a0a0a; 
      --card: #181818;
      --white: #ffffff; 
      --muted: #999999; 
      --steel: #333333; 
    }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--white); line-height: 1.6; text-align: center; }
    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    
    .topbar { padding: 32px 0; border-bottom: 1px solid var(--steel); margin-bottom: 40px; }
    .logo { font-size: 1.6rem; font-weight: 800; text-decoration: none; letter-spacing: -0.5px; }
    .logo .white { color: var(--white); }
    .logo .orange { color: var(--orange); text-transform: uppercase; }
    
    .hero { padding: 60px 0; }
    .hero h1 { font-size: clamp(2.2rem, 8vw, 4.2rem); font-weight: 900; line-height: 1.05; margin-bottom: 24px; text-transform: uppercase; }
    .hero h1 .accent { color: var(--orange); }
    .hero-sub { max-width: 600px; margin: 0 auto 48px; color: var(--muted); font-size: 1.2rem; }

    .form-card { background: var(--card); border: 1px solid var(--steel); border-radius: 14px; padding: 40px; max-width: 500px; margin: 0 auto 80px; text-align: left; }
    .form-card h2 { margin-bottom: 24px; font-weight: 800; text-transform: uppercase; text-align: center; }
    label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    
    select {
      width: 100%;
      background-color: var(--orange) !important;
      color: var(--white) !important;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      appearance: auto;
      cursor: pointer;
    }

    .cta-button {
      width: 100%;
      background-color: var(--white);
      color: var(--bg);
      font-size: 1.1rem;
      font-weight: 800;
      padding: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .preview-section { padding: 80px 0; border-top: 1px solid var(--steel); background: #050505; }
    .preview-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; text-align: left; }
    .preview-image-wrap { border: 1px solid var(--steel); border-radius: 20px; overflow: hidden; }
    .preview-image-wrap img { width: 100%; display: block; }
    
    footer { padding: 60px 0; text-align: center; color: #555; font-size: 0.9rem; }
    footer a { color: #777; text-decoration: none; margin: 0 10px; }
    @media (max-width: 900px) { .preview-inner { grid-template-columns: 1fr; text-align: center; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="logo"><span class="white">toolbox</span><span class="orange">PAY</span></div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Spend Less Time On Admin.<br /><span class="accent">More Time On The Job.</span></h1>
      <p class="hero-sub">Specialising in making trades profitable. Join the early access list to test ToolboxPay.</p>
      
      <div class="form-card">
        <h2>Join Early Access</h2>
        <form>
          <label>Your Trade</label>
          <select required>
            <option value="" disabled selected>Select your trade...</option>
            <option>Builder</option>
            <option>Electrician</option>
            <option>Plumber</option>
            <option>Landscaper</option>
          </select>
          <button type="submit" class="cta-button">Get Early Access</button>
        </form>
      </div>
    </div>
  </section>

  <section class="preview-section">
    <div class="container">
      <div class="preview-inner">
        <div class="preview-text">
          <h2>Built For Trades</h2>
          <p>Track profit and manage labour from your phone.</p>
        </div>
        <div class="preview-image-wrap">
          <img src="profit analysis.png" alt="Dashboard">
        </div>
      </div>
    </div>
  </section>

  <footer><p>&copy; 2026 ToolboxPay. <a href="#">Privacy</a></p></footer>
  <script src="https://tally.so/Widgets/Embed/v1.js?v=final"></script>
</body>
</html>

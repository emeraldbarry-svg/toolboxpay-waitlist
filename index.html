<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxPay — Early Access Waitlist</title>
  
  <link rel="icon" href="https://fav.farm/🟠" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    /* ─── Base Styles ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --orange: #ff6600; 
      --bg: #0a0a0a; 
      --card: #141414;
      --white: #ffffff; 
      --muted: #999999; 
      --steel: #333333; 
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg); 
      color: var(--white);
      line-height: 1.6; 
      text-align: center;
    }
    
    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    
    /* ─── Header ─── */
    .topbar { padding: 32px 0; border-bottom: 1px solid var(--steel); margin-bottom: 40px; }
    .logo { font-size: 1.6rem; font-weight: 800; text-decoration: none; letter-spacing: -0.5px; }
    .logo .white { color: var(--white); }
    .logo .orange { color: var(--orange); text-transform: uppercase; }
    
    /* ─── Hero ─── */
    .hero { padding: 40px 0; }
    .hero h1 { font-size: clamp(2.2rem, 8vw, 4.2rem); font-weight: 900; line-height: 1.05; margin-bottom: 24px; text-transform: uppercase; letter-spacing: -1px; }
    .hero h1 .accent { color: var(--orange); }
    .hero-sub { max-width: 600px; margin: 0 auto 48px; color: var(--muted); font-size: 1.2rem; }

    /* ─── Form Card (Restored Fields) ─── */
    .form-card { 
      background: var(--card); 
      border: 1px solid var(--steel); 
      border-radius: 14px; 
      padding: 40px; 
      max-width: 500px; 
      margin: 0 auto 80px; 
      text-align: left;
    }
    .form-card h2 { margin-bottom: 24px; font-weight: 800; text-transform: uppercase; text-align: center; color: var(--orange); }
    
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    
    input[type="text"],
    input[type="email"] {
      width: 100%;
      background-color: #1f1f1f;
      color: var(--white);
      border: 1px solid var(--steel);
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      font-family: inherit;
    }

    select {
      width: 100%;
      background-color: var(--orange) !important;
      color: var(--white) !important;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      appearance: auto;
    }

    .cta-button {
      width: 100%;
      background-color: var(--white);

<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxPay — Early Access</title>
  
  <link rel="icon" href="https://fav.farm/🟠" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --orange: #ff6600; 
      --bg: #0a0a0a; 
      --card: #141414;
      --white: #ffffff; 
      --muted: #999999; 
      --steel: #333333; 
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg); 
      color: var(--white);
      line-height: 1.6; 
      text-align: center;
      padding: 40px 0;
    }
    
    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    
    .logo { font-size: 1.6rem; font-weight: 800; margin-bottom: 40px; }
    .logo .white { color: var(--white); }
    .logo .orange { color: var(--orange); text-transform: uppercase; }
    
    h1 { font-size: clamp(2.2rem, 8vw, 4.2rem); font-weight: 900; line-height: 1.05; margin-bottom: 24px; text-transform: uppercase; }
    h1 span { color: var(--orange); }
    
    .hero-sub { max-width: 600px; margin: 0 auto 48px; color: var(--muted); font-size: 1.2rem; }

    .form-card { 
      background: var(--card); 
      border: 1px solid var(--steel); 
      border-radius: 14px; 
      padding: 40px; 
      max-width: 500px; 
      margin: 0 auto; 
      text-align: left;
    }
    
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    
    input {
      width: 100%;
      background-color: #1f1f1f;
      color: var(--white);
      border: 1px solid var(--steel);
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
    }

    select {
      width: 100%;
      background-color: var(--orange) !important;
      color: var(--white) !important;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      appearance: auto;
    }

    .cta-button {
      display: block;
      width: 100%;
      background-color: var(--white);
      color: var(--bg);
      font-size: 1.1rem;
      font-weight: 900;
      padding: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo"><span class="white">toolbox</span><span class="orange">PAY</span></div>
    
    <h1>Spend Less Time On Admin.<br /><span>More Time On The Job.</span></h1>
    <p class="hero-sub">Specialising in making trades profitable. Join the early access list to test ToolboxPay. [cite: 2026-02-20]</p>
    
    <div class="form-card">
      <form action="https://tally.so/r/YOUR_TALLY_ID" method="POST">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Your name" required />
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="Email address" required />
        </div>

        <div class="input-group">
          <label>Your Trade</label>
          <select name="trade" required>
            <option value="" disabled selected>Select your trade...</option>
            <option>Builder</option>
            <option>Electrician</option>
            <option>Plumber</option>
            <option>Landscaper</option>
          </select>
        </div>

        <button type="submit" class="cta-button">Get Early Access</button>
      </form>
    </div>
  </div>

</body>
</html>

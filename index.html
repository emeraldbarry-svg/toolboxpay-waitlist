<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxPay — Early Access Waitlist</title>
  <link rel="icon" href="https://fav.farm/🟠" />
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://toolboxpay.com/">
  <meta property="og:title" content="ToolboxPay — Built For The Trades">
  <meta property="og:description" content="Stop doing admin on your weekends. Quotes, invoices, and profit analysis from your phone.">
  <meta property="og:image" content="https://toolboxpay.com/toolboxpay%20dashboard.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #ff6600;
      --orange-hover: #e55a00;
      --bg: #111111;
      --bg-alt: #0d0d0d;
      --card: #181818;
      --steel: #333333;
      --white: #ffffff;
      --muted: #999999;
      --radius: 14px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--white); /* Forces all text to white */
      line-height: 1.65;
    }
    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    
    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(17, 17, 17, 0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--steel); padding: 18px 0; text-align: left; }
    .logo { font-size: 1.45rem; font-weight: 800; text-decoration: none; }
    .logo .white { color: var(--white); }
    .logo .orange { color: var(--orange); }
    
    .hero { padding: 60px 0 40px; text-align: center; }
    .hero h1 { font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 24px; color: var(--white); }
    .hero h1 .accent { color: var(--orange); }

    .countdown-container { margin: 20px auto 40px; display: flex; justify-content: center; gap: 15px; }
    .time-block { background: var(--card); border: 1px solid var(--steel); padding: 15px; border-radius: 12px; min-width: 80px; text-align: center; }
    .time-num { display: block; font-size: 1.8rem; font-weight: 800; color: var(--orange); }
    .time-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    .form-section { padding: 20px 0 60px; }
    .form-card { background: var(--card); border: 1px solid var(--steel); border-radius: var(--radius); padding: 10px; max-width: 620px; margin: 0 auto; overflow: hidden; }

    .preview-section { padding: 60px 0; background: var(--bg-alt); border-top: 1px solid var(--steel); }
    .preview-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
    .preview-image-wrap { border: 1px solid var(--steel); border-radius: 16px; overflow: hidden; }
    .preview-image-wrap img { width: 100%; display: block; height: auto; }
    
    .preview-text h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 16px; color: var(--white); }
    .preview-text p { color: var(--muted); font-size: 1.1rem; }

    footer { padding: 40px 0; text-align: center; border-top: 1px solid var(--steel); background: var(--bg-alt); }
    footer a { color: var(--muted); text-decoration: none; font-size: 0.85rem; margin: 0 12px; }
    footer a:hover { color: var(--orange); }

    @media (max-width: 860px) { 
      .preview-inner { grid-template-columns: 1fr; text-align: center; } 
      .hero { padding: 40px 0; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container"><a href="#" class="logo"><span class="white">toolbox</span><span class="orange">PAY</span></a></div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>Spend Less Time On Admin.<br /><span class="accent">More Time On The Job.</span></h1>
      <div class="countdown-container" id="timer">
        <div class="time-block"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
        <div class="time-block"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
        <div class="time-block"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
        <div class="time-block"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
      </div>
    </div>
  </section>

  <section class="form-section">
    <div class="container">
      <div class="form-card">
        <iframe data-tally-src="https://tally.so/embed/ZjJooo?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="600" frameborder="0" title="Join ToolboxPay"></iframe>
        <script>var d=document,w="https://tally.so/Widgets/Embed/v1.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s)}</script>
      </div>
    </div>
  </section>

  <section class="preview-section">
    <div class="container">
      <div class="preview-inner">
        <div class="preview-text">
          <h2>Built For Trades</h2>
          <p>Track your profit and manage your labour costs from the palm of your hand. No more paperwork on the weekends.</p>
        </div>
        <div class="preview-image-wrap">
          <img src="Profit%20analysis.png" alt="ToolboxPay Profit Analysis">
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p style="margin-bottom: 15px;">&copy; 2026 ToolboxPay. All rights reserved.</p>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </footer>

  <script>
    const launchDate = new Date("April 1, 2026 00:00:00").getTime();
    const timerFunc = setInterval(function() {
      const now = new Date().getTime();
      const distance = launchDate - now;
      document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
      document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      document.getElementById("mins").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      document.getElementById("secs").innerHTML = Math.floor((distance % (1000 * 60)) / 1000);
      if (distance < 0) { clearInterval(timerFunc); document.getElementById("timer").innerHTML = "LAUNCHED"; }
    }, 1000);
  </script>
</body>
</html>
